apiVersion: v1
kind: Secret
metadata:
  name: vibescan-secrets
  namespace: vibescan
type: Opaque
stringData:
  # Database
  DB_PASSWORD: "your-database-password"

  # S3
  AWS_ACCESS_KEY_ID: "your-s3-access-key"
  AWS_SECRET_ACCESS_KEY: "your-s3-secret-key"

  # Encryption
  ENCRYPTION_KEY: "your-32-char-encryption-key-min"

  # JWT
  JWT_SECRET: "your-32-char-jwt-secret-min"

  # Stripe
  STRIPE_SECRET_KEY: "your-stripe-secret-key"
  STRIPE_WEBHOOK_SECRET: "your-stripe-webhook-secret"

  # Codescoring/BlackDuck
  CODESCORING_API_URL: "https://api.codescoring.com"
  CODESCORING_API_KEY: "your-codescoring-api-key"
