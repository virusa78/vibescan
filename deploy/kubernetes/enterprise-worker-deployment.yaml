apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibescan-enterprise-worker
  namespace: vibescan
  labels:
    app: vibescan
    component: enterprise-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vibescan
      component: enterprise-worker
  template:
    metadata:
      labels:
        app: vibescan
        component: enterprise-worker
    spec:
      containers:
        - name: worker
          image: vibescan/worker:latest
          imagePullPolicy: Always
          command:
            - node
            - --import
            - tsx
            - wasp-app/src/server/workers/enterpriseScannerWorker.ts
          envFrom:
            - configMapRef:
                name: vibescan-config
            - secretRef:
                name: vibescan-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
