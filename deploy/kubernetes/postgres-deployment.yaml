apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibescan-postgres
  namespace: vibescan
  labels:
    app: vibescan
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vibescan
      component: postgres
  template:
    metadata:
      labels:
        app: vibescan
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: vibescan-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vibescan-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: "vibescan"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          securityContext:
            runAsUser: 999
            runAsGroup: 999
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: vibescan-postgres
  namespace: vibescan
  labels:
    app: vibescan
    component: postgres
spec:
  selector:
    app: vibescan
    component: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: vibescan
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
