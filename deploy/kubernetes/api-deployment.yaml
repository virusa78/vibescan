apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibescan-api
  namespace: vibescan
  labels:
    app: vibescan
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vibescan
      component: api
  template:
    metadata:
      labels:
        app: vibescan
        component: api
    spec:
      containers:
        - name: api
          image: vibescan/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: vibescan-config
            - secretRef:
                name: vibescan-secrets
          env:
            - name: PORT
              value: "3000"
            - name: VIBESCAN_EMBED_WORKERS
              value: "false"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vibescan-api
  namespace: vibescan
  labels:
    app: vibescan
    component: api
spec:
  selector:
    app: vibescan
    component: api
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
