apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibescan-scan-orchestrator
  namespace: vibescan
  labels:
    app: vibescan
    component: scan-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vibescan
      component: scan-orchestrator
  template:
    metadata:
      labels:
        app: vibescan
        component: scan-orchestrator
    spec:
      containers:
        - name: scan-orchestrator
          image: vibescan/orchestrator:latest
          imagePullPolicy: Always
          command:
            - node
            - dist/services/scanOrchestrator.js
          envFrom:
            - configMapRef:
                name: vibescan-config
            - secretRef:
                name: vibescan-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
