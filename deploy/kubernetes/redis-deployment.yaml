apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibescan-redis
  namespace: vibescan
  labels:
    app: vibescan
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vibescan
      component: redis
  template:
    metadata:
      labels:
        app: vibescan
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - allkeys-lru
          securityContext:
            runAsUser: 999
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: vibescan-redis
  namespace: vibescan
  labels:
    app: vibescan
    component: redis
spec:
  selector:
    app: vibescan
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: vibescan
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
