name: Kubernetes Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy (tag or sha)'
        required: true
        default: 'latest'

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure Kubernetes cluster
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          kubectl config use-context ${{ secrets.KUBE_CONTEXT }}

      - name: Update image tags
        run: |
          IMAGE_TAG="${{ github.event.inputs.version }}"
          kubectl set image deployment/vibescan-api api=ghcr.io/${{ github.repository }}/api:${IMAGE_TAG} -n vibescan
          kubectl set image deployment/vibescan-free-worker worker=ghcr.io/${{ github.repository }}/worker:${IMAGE_TAG} -n vibescan
          kubectl set image deployment/vibescan-enterprise-worker worker=ghcr.io/${{ github.repository }}/worker:${IMAGE_TAG} -n vibescan

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/vibescan-api -n vibescan --timeout=120s
          kubectl rollout status deployment/vibescan-free-worker -n vibescan --timeout=120s
          kubectl rollout status deployment/vibescan-enterprise-worker -n vibescan --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n vibescan
          kubectl get svc -n vibescan
